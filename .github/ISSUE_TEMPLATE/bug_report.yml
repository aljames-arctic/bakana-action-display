name: Bug Report
description: Report a bug or unexpected behavior in the HUD.
title: "[Bug]: <Short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the form below to help us reproduce and fix the issue.
  
  - type: input
    id: system
    attributes:
      label: Game System & Version
      description: What game system are you running, and what is its version?
      placeholder: e.g., dnd5e v4.0.3 or pf2e v6.1.2
    validations:
      required: true

  - type: input
    id: foundry_version
    attributes:
      label: Foundry VTT Version
      description: Which version and build of Foundry VTT are you using?
      placeholder: e.g., V12 Build 328
    validations:
      required: true

  - type: textarea
    id: active_modules
    attributes:
      label: Relevant Active Modules
      description: List any active modules that might interact with the HUD, items, or rolls (especially automation modules like Midi-QOL, Ready Up, etc.).
      placeholder: e.g., midi-qol v12.0.5, warpgate, etc.
    validations:
      required: true

  - type: dropdown
    id: troubleshooting
    attributes:
      label: Basic Troubleshooting
      description: Have you tried disabling all non-relevant modules to see if the issue persists? (A clean environment helps isolate conflicts).
      options:
        - "Yes, and the bug still occurs in a clean environment"
        - "No, I cannot disable other modules right now"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      description: A clear and concise description of what the bug is and what you expected to happen.
      placeholder: Describe what is happening...
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      description: Explain exactly how we can reproduce the bug, step-by-step.
      placeholder: |
        1. Select a token...
        2. Open the HUD...
        3. Click on ...
        4. See error in console...
    validations:
      required: true

  - type: textarea
    id: console_errors
    attributes:
      label: Console Errors / Logs
      description: If applicable, press F12, open the console, and paste any red error logs or stack traces here.
      placeholder: Paste console errors here...
    validations:
      required: false
